spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: false

app:
  jwt:
    secret: TestSecretKeyForJWTTokenGenerationMustBeLongEnough256BitsForTesting
    expiration: 86400000
    refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:5173
  upload:
    dir: /tmp/nexus-test-uploads

logging:
  level:
    com.nexus: WARN
    org.springframework.security: WARN
